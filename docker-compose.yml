# Control Design Copilot — full local stack (simulation-only SaaS).
#
#   docker compose up            # db + redis + api + worker
#   docker compose up db redis   # infra only
#
# `web` (Next.js) is added in E3. The api and worker share one image (this repo's
# Dockerfile); they differ only in `command`. Source is bind-mounted for hot reload;
# the virtualenv lives at /opt/venv inside the image so the mount never hides it.

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-copilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-copilot}
      POSTGRES_DB: ${POSTGRES_DB:-copilot}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-copilot} -d ${POSTGRES_DB:-copilot}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://copilot:copilot@db:5432/copilot}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      # E2.2: turn on the Postgres-backed job store so state survives restarts and
      # crosses the worker boundary.
      COPILOT_PERSIST: "true"
      # E2.3: enqueue CPU-heavy design runs to the RQ worker so the API stays responsive.
      COPILOT_ASYNC_RUNS: "true"
      # E2.4: publish live events over Redis pub/sub + serve the SSE stream endpoint.
      COPILOT_EVENTS: "true"
      # E2.5: require Bearer API keys + per-tenant scoping + Redis rate limits. The dev
      # bootstrap key is seeded on startup so the stack is usable out of the box; override
      # COPILOT_DEV_API_KEY / COPILOT_API_KEY_PEPPER in .env for anything real.
      COPILOT_AUTH: "true"
      COPILOT_DEV_API_KEY: ${COPILOT_DEV_API_KEY:-dev-local-key}
      COPILOT_API_KEY_PEPPER: ${COPILOT_API_KEY_PEPPER:-copilot-dev-pepper}
      # E3: allow the Next.js web app's browser origin to call the API (CORS).
      COPILOT_CORS_ORIGINS: ${COPILOT_CORS_ORIGINS:-http://localhost:3000}
      # Windows-friendly file watching for --reload across the bind mount.
      WATCHFILES_FORCE_POLLING: "true"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Apply migrations (idempotent) before serving so the schema is always current.
    command: sh -c "uv run alembic upgrade head && uv run uvicorn saas.api:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://copilot:copilot@db:5432/copilot}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      COPILOT_PERSIST: "true"
      # E2.4: the worker publishes run.status + workspace.updated so SSE clients see progress.
      COPILOT_EVENTS: "true"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Queue name finalized in E2.3; RQ worker consumes design-run jobs.
    command: uv run rq worker --url ${REDIS_URL:-redis://redis:6379/0} copilot

  # E3: React/Next two-pane UI (RIGHT = chat + activity; LEFT = dynamic artifact tabs).
  # Consumes GET /jobs/{id}/events over SSE and renders trajectory data client-side. The
  # browser (not this container) talks to the API, so NEXT_PUBLIC_* point at the host-
  # published API port. Source is bind-mounted for hot reload; node_modules stays in an
  # anonymous volume so the host (Windows) modules never shadow the container's.
  web:
    build: ./web
    environment:
      # Public (browser-visible) config: the API base URL + the dev bootstrap key so the
      # UI works out of the box. Real per-user accounts come later (decisions).
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8000}
      NEXT_PUBLIC_COPILOT_API_KEY: ${COPILOT_DEV_API_KEY:-dev-local-key}
      WATCHPACK_POLLING: "true"
    volumes:
      - ./web:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - api
    command: sh -c "npm install && npm run dev"

volumes:
  pgdata:
