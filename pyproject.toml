[project]
name = "agentic-dc-motor-control"
version = "0.1.0"
description = "Agentic orchestration of DC motor control — from plant model to PID agents"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "matplotlib>=3.11.1",
    "numpy>=2.5.1",
    "openai>=2.46.0",
    "python-dotenv>=1.2.2",
    "scipy>=1.18.0",
]

[dependency-groups]
dev = [
    "ipykernel>=7.3.0",
    "jupyter>=1.1.1",
]
