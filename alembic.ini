# Alembic configuration for the Control Design Copilot (E2 persistence).
#
# The database URL is resolved at runtime from saas.config.get_settings() (env-driven),
# so no secret / connection string lives in this file. Run migrations with:
#
#   uv run alembic upgrade head        # apply
#   uv run alembic revision --autogenerate -m "message"
#
# Inside Docker Compose the api/worker use DATABASE_URL (postgres); for host use set it
# to a localhost Postgres or a sqlite:/// URL.

[alembic]
script_location = saas/migrations
prepend_sys_path = .
path_separator = os

# sqlalchemy.url is intentionally left blank — env.py injects it from settings.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
